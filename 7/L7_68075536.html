<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>68075536</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
}

/* Video Background */
#myVideo{
    position: fixed;
    right:0;
    bottom:0;
    min-width:100%;
    min-height:100%;
    object-fit:cover;
    z-index:-1;
}

/* form อยู่กลางจอ */
.form-wrapper{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* กล่อง form */
.form-card{
    width:450px;
    background:rgba(255,255,255,0.9);
}

/* ปุ่ม video */
.video-control{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
}

</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="#">68075536 ธนกร อรุณศรี</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#">หน้าแรก</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">ข้อมูลบริษัท</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">บริการ</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">เกี่ยวกับเรา</a>
</li>

</ul>
</div>
</div>
</nav>

<!-- Video Background -->
<video autoplay muted loop id="myVideo">
<source src="vdo/4.mp4" type="video/mp4">
</video>

<!-- ปุ่มควบคุม video -->
<div class="video-control">

<button class="btn btn-warning btn-sm me-2"
onclick="document.getElementById('myVideo').play()">
▶ Play
</button>

<button class="btn btn-danger btn-sm"
onclick="document.getElementById('myVideo').pause()">
⏸ Pause
</button>

</div>

<!-- Form -->
<div class="form-wrapper">

<div class="card shadow form-card">

<div class="card-header bg-primary text-white text-center">
แบบฟอร์มลงทะเบียน
</div>

<div class="card-body">

<form>

<div class="mb-3">
<label class="form-label">ชื่อ-นามสกุล</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">อีเมล</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">รหัสผ่าน</label>
<input type="password" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">เพศ</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">ชาย</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">หญิง</label>
</div>

</div>

<div class="mb-3">
<label class="form-label">ตำแหน่ง</label>

<select class="form-select">
<option>Please select a position</option>
<option>Manager</option>
<option>Developer</option>
<option>Designer</option>
<option>Marketing</option>
</select>

</div>

<div class="text-center">
<button class="btn btn-success">ลงทะเบียน</button>
<button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
</div>

</form>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
